name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: madchavez/flask-iris-ml-demo
          huggingface_repo_id: YOUR_HF_USERNAME/flask-iris-ml-demo
          hf_token: ${{ secrets.HF_TOKEN }}
          space_sdk: docker
